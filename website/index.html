<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>IMDIGEST</title>
  <link rel="stylesheet" href="./assets/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="left-group">
        <a class="logo" href="./">IMDIGEST</a>
        <nav class="nav">
          <a class="active" href="./">Home</a>
          <a href="./posts/">목록</a>
          <a href="./about/">About</a>
        </nav>
      </div>
      <button class="theme-toggle" type="button" data-theme-toggle>다크 모드</button>
    </div>
  </header>

  <main class="page">
    <div class="home-grid">
      <section class="hero">
        <div>
          <p class="eyebrow">DAILY AI BRIEF</p>
          <h1>AI 뉴스와 논문을 한 번에 읽히는 편집형 브리핑으로</h1>
          <p class="subtext">
            공식 발표, 커뮤니티 신호, 오늘의 논문을 짧은 핵심과 맥락으로 나눠 정리합니다.
          </p>
          <div class="actions">
            <a id="today-post-link" class="btn-primary" href="./posts/">오늘 리포트 보기</a>
            <a class="btn-secondary" href="./posts/">아카이브 열기</a>
          </div>
        </div>
        <div class="hero-meta" aria-label="리포트 구성">
          <div class="metric"><strong>Daily</strong><span>매일 갱신</span></div>
          <div class="metric"><strong>Signals</strong><span>뉴스와 반응</span></div>
          <div class="metric"><strong>Papers</strong><span>연구 흐름</span></div>
        </div>
      </section>

      <section class="surface">
        <div class="section-head">
          <div>
            <p class="section-kicker">Latest Issue</p>
            <h2>최신 리포트</h2>
          </div>
          <a class="small-link" href="./posts/">전체 목록</a>
        </div>
        <div id="latest-preview">
          <p class="muted">최신 리포트를 불러오는 중...</p>
        </div>
      </section>
    </div>
  </main>

  <script src="./assets/common.js"></script>
  <script src="./assets/home.js"></script>
</body>
</html>
