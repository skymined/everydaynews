defaults:
  max_items_per_source: 10
  user_agent: "ai-trend-digest/0.1 (+https://github.com/your-org/ai-trend-digest)"
  timeout_sec: 30
  concurrency: 6
  host_rps: 1.5
  extract_max_chars: 8000

llm:
  default_mode: "api"
  default_provider: "gemini"
  openai_model: "gpt-4.1-mini"
  gemini_model: "gemini-2.5-flash"
  max_items_to_summarize: 40
  local_backend: "llama"
  local_base_url: "http://127.0.0.1:11434/v1"
  local_model: "qwen2.5:7b"

report:
  timezone: "Asia/Seoul"
  max_news_items: 16
  max_papers: 10

scoring:
  source_weights:
    openai_news: 1.0
    google_deepmind_blog: 1.0
    google_research: 0.95
    anthropic_news: 0.95
    meta_ai_blog: 0.9
    microsoft_research: 0.9
    aws_ml_blog: 0.8
    nvidia_dev_blog: 0.85
    techcrunch_ai: 0.82
    google_news_ai_search: 0.84
    x_search: 0.83
    threads_recent: 0.8
    reddit_machinelearning: 0.76
    reddit_localllama: 0.78
    reddit_artificial: 0.74
    hf_blog: 0.9
    hf_papers_today: 1.0
  priority_keywords:
    - "release"
    - "launch"
    - "agent"
    - "reasoning"
    - "benchmark"
    - "security"
    - "policy"
    - "governance"
    - "open-source"
    - "inference"
    - "gemini"
    - "gpt"
    - "claude"
    - "robot"
  tag_keywords:
    product:
      - "release"
      - "launch"
      - "api"
      - "pricing"
      - "agent"
    policy:
      - "policy"
      - "regulation"
      - "governance"
      - "compliance"
    research:
      - "paper"
      - "benchmark"
      - "evaluation"
      - "method"
    community:
      - "reddit"
      - "discussion"
      - "thread"
      - "community"
    infrastructure:
      - "inference"
      - "training"
      - "gpu"
      - "latency"
      - "throughput"

sources:
  - id: openai_news
    name: OpenAI News
    type: rss
    url: "https://openai.com/news/rss.xml"
    max_items: 10

  - id: google_deepmind_blog
    name: Google DeepMind Blog
    type: rss
    url: "https://deepmind.google/blog/rss.xml"
    max_items: 10

  - id: google_research
    name: Google Research Blog
    type: rss
    url: "https://research.google/blog/rss/"
    max_items: 10

  - id: microsoft_research
    name: Microsoft Research Blog
    type: rss
    url: "https://www.microsoft.com/en-us/research/blog/feed/"
    max_items: 10

  - id: aws_ml_blog
    name: AWS Machine Learning Blog
    type: rss
    url: "https://aws.amazon.com/blogs/machine-learning/feed/"
    max_items: 10

  - id: nvidia_dev_blog
    name: NVIDIA Developer Blog
    type: rss
    url: "https://developer.nvidia.com/blog/feed/"
    max_items: 10

  - id: techcrunch_ai
    name: TechCrunch AI
    type: rss
    url: "https://techcrunch.com/category/artificial-intelligence/feed/"
    max_items: 10

  - id: google_news_ai_search
    name: Google News AI Search
    type: rss
    url: "https://news.google.com/rss/search?q=when:1d+AI+OR+LLM+OR+OpenAI+OR+Anthropic+OR+Gemini+OR+Claude+OR+NVIDIA&hl=en-US&gl=US&ceid=US:en"
    max_items: 10
    include_keywords:
      - "ai"
      - "llm"
      - "openai"
      - "anthropic"
      - "gemini"
      - "claude"
      - "nvidia"
      - "robot"
      - "agent"

  - id: reddit_machinelearning
    name: Reddit r/MachineLearning
    type: rss
    url: "https://www.reddit.com/r/MachineLearning/new/.rss"
    max_items: 10
    include_keywords:
      - "[R]"
      - "[P]"
      - "[D]"
      - "llm"
      - "agent"
      - "model"
      - "benchmark"
      - "paper"

  - id: reddit_localllama
    name: Reddit r/LocalLLaMA
    type: rss
    url: "https://www.reddit.com/r/LocalLLaMA/new/.rss"
    max_items: 10
    include_keywords:
      - "llama"
      - "openai"
      - "gemini"
      - "claude"
      - "qwen"
      - "deepseek"
      - "agent"
      - "benchmark"

  - id: reddit_artificial
    name: Reddit r/artificial
    type: rss
    url: "https://www.reddit.com/r/artificial/hot/.rss"
    max_items: 10
    include_keywords:
      - "ai"
      - "agent"
      - "model"
      - "research"
      - "robot"
      - "paper"

  - id: hf_blog
    name: Hugging Face Blog
    type: rss
    url: "https://huggingface.co/blog/feed.xml"
    max_items: 10

  - id: hf_papers_today
    name: Hugging Face Papers (Top today)
    type: html
    url: "https://huggingface.co/papers"
    max_items: 10
    selectors:
      item: "article, li"
      title: "h3, h2, a"
      link: "a"

watch_sites: []
