name: Daily AI Trend Digest

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run digest
        env:
          LLM_MODE: api
          LLM_PROVIDER: gemini
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: |
          test -n "${GEMINI_API_KEY}" || (echo "GEMINI_API_KEY secret is required" && exit 1)
          python -m digest run --date "$(date -u +%F)" --out "website/reports/$(date -u +%F).md" --latest-path "website/reports/latest.md"
          python website/scripts/build_reports_index.py

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website/reports/ website/posts/ website/reports.json website/.nojekyll data/digest.sqlite3 || true
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: daily digest $(date -u +%F)"
          git push origin HEAD:main
